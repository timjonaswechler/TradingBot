issues:
  sequence: [115, 116, 117, 118]
  alreadyDone: []
  blockedBy:
    116: [115]
    117: [116]
    118: [117]

references:
  githubIssues:
    - 31
    - 32
    - 33
    - 37
    - 39
    - 43
    - 115
    - 116
    - 117
    - 118
  githubPRs: []
  files:
    - CONTEXT.md
    - docs/refactor/runtime-migration-control.md
    - docs/refactor/trading-runtime-refactor-plan.md
    - docs/adr/0002-build-trading-runtime-as-new-crate.md
    - docs/adr/0003-runtime-managed-risk-exits-are-opt-in-hard-exits.md

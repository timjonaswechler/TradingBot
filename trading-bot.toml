# TradingBot2 — Daemon Configuration
# Usage:
#   trading-daemon seed --config trading-bot.toml          # load historical data
#   trading-daemon run  --config trading-bot.toml          # start live daemon

[database]
url    = "http://127.0.0.1:3000"
module = "trading-bot"

[seed]
# Default start date for historical data (ISO 8601)
from = "2020-01-01"

# ── Assets ────────────────────────────────────────────────────────────────────
# Each asset binds a strategy to a symbol. The strategy file declares the
# Primary Timeframe and any Secondary Timeframes used by run/seed.

[[assets]]
symbol            = "AAPL"
strategy          = "strategies/sma_cross.rhai"
execution_mode    = "paper_trading"
strategy_identity = "sma-cross-aapl-paper"
balance           = 10000.0

# Protective Runner Shutdown is live-runner policy for repeated required
# Secondary-Timeframe context loss. It consumes Trading Runtime
# StrategyTickBlocked events; optional Secondary diagnostics do not count.
# Defaults are enabled = true and required_secondary_failure_threshold = 3.
# Set enabled = false to disable. Threshold 0 is invalid.
[assets.protective_shutdown]
enabled = true
required_secondary_failure_threshold = 3

